app:
  port: 8082
  ui_enabled: true
  # Passwords support environment variables: ${VAR} or $VAR
  ui_password: "${RMS_PASSWORD}"
  jwt_secret: "${RMS_JWT_SECRET}"
  jellyfin_version: "10.10.7"
  # Optional: enable on-disk remux cache so subsequent plays of remuxed files
  # are served via http.ServeFile and support seek/Range. First play still
  # streams live (no seek); the cache builds in the background and is used on
  # later plays. Unset cache_path to disable. Default cache_max_gb is 10.
  # cache_path: "./cache"
  # cache_max_gb: 10
  debug: false
  # GC tuning for low-memory devices (e.g. Raspberry Pi). Both are optional and
  # default to off (Go's normal behavior). The standard env vars take precedence:
  # if GOGC / GOMEMLIMIT are exported, the runtime honors those and these are
  # ignored — so you can override per-process without editing config.
  #   gogc: lower than 100 = collect more often, less peak RAM, slightly more CPU.
  #         A media server is idle most of the time, so 50 is a safe starting point.
  #   memory_limit_mb: soft heap ceiling (GOMEMLIMIT). Keep headroom below the
  #         container/device limit; too low causes GC thrashing. 0 = no limit.
  # gogc: 50
  # memory_limit_mb: 256
  # Webhook token for external library rescans (Sonarr, Radarr, scripts).
  # When set, enables POST /api/v1/library/rescan-hook (no JWT required).
  # Calls within 5s are debounced into one walk. Leave empty to disable.
  # webhook_token: "${RMS_WEBHOOK_TOKEN}"

player:
  # Strategies tried in order when playing video. Remove "transcode" on low-power devices.
  stream_strategy: ["direct", "remux", "transcode"]

libraries:
  - friendly_name: "Movies"
    path: "./media/Movies"
    metadata_lang: en
    content_type: movies

  - friendly_name: "TV Shows"
    path: "./media/TV"
    metadata_lang: en
    content_type: tvseries

  # - friendly_name: "Anime"
  #   path: "./media/Anime"
  #   metadata_lang: en
  #   content_type: tvseries

  # TV / IPTV (see ADR-015). `path` is an M3U/JSON playlist, a directory of
  # playlists, or an http(s) URL. Channels are grouped by `group-title` into
  # categories. The library only appears when the playlist parses ≥1 channel.
  # - friendly_name: "TV"
  #   content_type: tv
  #   path: "./lists/tv.m3u"
  #   tv_proxy: false        # false = 302 redirect (default); true = proxy the stream
  #   tv_refresh_hours: 0    # re-fetch a remote playlist every N hours (0 = boot/rescan only)

# Optional: define additional users with per-library access.
# The built-in "rms" user (with app.ui_password) is ALWAYS available and has
# access to every library — you don't need to list it here. Users defined
# below get only the libraries listed in their `libraries:` field (empty = all).
# users:
#   - username: "raul"
#     password: "${RAUL_PASSWORD}"
#     libraries: ["Movies", "Anime"]
#   - username: "maria"
#     password: "${MARIA_PASSWORD}"
#     libraries: ["Movies", "TV Shows"]

# Crawler settings (used by the subcrawler and metacrawler binaries, not by rms
# itself — rms only shells out to them during an auto-scan).
#
# Note: the crawlers are a *just-in-case* convenience. If your media already
# arrives with its metadata, posters and subtitles (e.g. fetched by the sibling
# "reel" downloader), you can leave auto_scan.enabled: false and they never run.
# They only earn their keep for media you drop in by hand without sidecar files.
crawlers:
  subtitles:
    api_key: "${OPENSUBTITLES_API_KEY}"
    languages: ["en", "es"]
  metadata:
    tmdb_api_key: "${TMDB_API_KEY}"

  # --- Background jobs overview --------------------------------------------
  # rms can run up to three independent background jobs. Each only starts when
  # its setting is enabled, so an install that needs none stays idle:
  #
  #   1. Auto-scan      (auto_scan.enabled)   — shells out to metacrawler +
  #      subcrawler to DOWNLOAD missing metadata/subtitles/thumbnails, then
  #      refreshes the item index. Heaviest job; runs the external binaries as
  #      child processes. Off by default.
  #   2. Index refresh  (rescan_interval_minutes) — independent of auto-scan.
  #      Just a cheap filesystem walk to pick up added/removed files; runs NO
  #      crawlers. Use it for polling-based detection when you can't wire an
  #      external trigger (webhook_token above). 0 = disabled.
  #   3. TV refresh     (per-library tv_refresh_hours) — only when a
  #      content_type: "tv" library exists; re-fetches remote IPTV playlists.
  #
  # The Live TV subsystem (channel store + /LiveTv routes) is not even
  # initialized unless at least one content_type: "tv" library is configured.
  auto_scan:
    enabled: false              # master switch for the metadata/subtitle crawlers
    schedule: ""                # "HH:MM" daily (e.g. "03:00"); overrides interval_hours
    interval_hours: 24          # fallback cadence when schedule is empty
    rescan_interval_minutes: 0  # index-only refresh; e.g. 10 for polling-based detection
    metadata: true              # download missing metadata via metacrawler
    subtitles: true             # download missing subtitles via subcrawler
    thumbnails: false           # generate thumbnails — CPU intensive on low-power devices
